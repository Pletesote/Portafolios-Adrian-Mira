<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Enviado · Adrián Mira</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">

    <style>
        /* VARIABLES MODERNAS (Las mismas de tu web principal) */
        :root {
          --bg-color: #030712;
          --accent: #6366f1;
          --accent-hover: #4f46e5;
          --text: #f9fafb;
          --muted: #9ca3af;
          --card-bg: rgba(17, 24, 39, 0.7);
          --border: rgba(255, 255, 255, 0.1);
          --radius: 1rem;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: 'Inter', system-ui, -apple-system, sans-serif;
          background-color: var(--bg-color);
          background-image: 
            radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%),
            radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 40%);
          color: var(--text);
          line-height: 1.5;
          /* Flexbox para centrar todo en la pantalla */
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          text-align: center;
        }

        .thank-you-card {
          background: var(--card-bg);
          border: 1px solid var(--border);
          padding: 3rem 2rem;
          border-radius: var(--radius);
          backdrop-filter: blur(10px);
          max-width: 500px;
          width: 90%;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
          /* Animación suave de entrada */
          animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-success {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 2.2rem;
            color: var(--text);
        }

        p {
            color: var(--muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* Estilo del botón (Mismo que el de enviar formulario) */
        .btn-return {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-return:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <span class="icon-success">✅</span>
        <h1>¡Mensaje Enviado!</h1>
        <p>Gracias por ponerte en contacto conmigo. He recibido tu mensaje correctamente y te responderé lo antes posible.</p>
        
        <a href="https://portafolios-adrianmira.vercel.app" class="btn-return">Volver al inicio</a>
    </div>

</body>
</html>
